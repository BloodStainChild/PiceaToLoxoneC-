services:
  picea-to-loxone:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picea-to-loxone
    restart: unless-stopped
    init: true
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    environment:
      LOG_DIR: /app/Log
      LOG_DEBUG: "${LOG_DEBUG:-0}"
    volumes:
      - ./config/config.cfg:/app/config.cfg
      - ./logs:/app/Log
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
